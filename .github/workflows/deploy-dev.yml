name: Deploy to DEV - try 1

on:
  push:
    branches:
      - main
    paths:
      - 'hello_world_deployment/**'
      - '.github/workflows/**'

  pull_request:
    branches:
      - main
    paths:
      - 'hello_world_deployment/**'
      - '.github/workflows/**'

  workflow_dispatch:

env:
  AWS_REGION: us-east-2

  # ECR
  ECR_REGISTRY: 099554283130.dkr.ecr.us-east-2.amazonaws.com
  ECR_REPOSITORY: teaching/ecr_deploy1

  # Containers
  CONTAINER_BACKEND: backend-container
  CONTAINER_FRONTEND: frontend-container

  # Ports
  BACKEND_PORT: 8000
  FRONTEND_PORT: 3000

jobs:
  deploy:
    name: Build → Push ECR → Deploy EC2
    runs-on: ubuntu-latest
    environment: DEV

    steps:
      # ── 1. Checkout ────────────────────────────────────────────────────────
      - name: Checkout code
        uses: actions/checkout@v4

      # ── 2. Configure AWS credentials ──────────────────────────────────────
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}
          mask-aws-account-id: "true"

      - name: Test AWS Credentials
        run: |
          echo "Testing AWS credentials..."
          aws sts get-caller-identity --output json
          echo "✅ AWS credentials are valid."

      # ── 3. Login to Amazon ECR ────────────────────────────────────────────
      - name: Login to Amazon ECR
        uses: aws-actions/amazon-ecr-login@v2

      # ── 4. Build & Push Docker Images ─────────────────────────────────────
      - name: Build and Push Docker Images
        id: build-and-push
        run: |
          echo "📍 Current directory: $(pwd)"
          ls -la

          # Move into the project folder
          cd hello_world_deployment

          echo "📂 Now inside hello_world_deployment folder:"
          ls -la

          # === BUILD BACKEND ===
          echo "🔨 Building Backend Docker Image..."
          BACKEND_IMAGE_URI="$ECR_REGISTRY/$ECR_REPOSITORY:backend-$IMAGE_TAG"
          
          docker build -t "$BACKEND_IMAGE_URI" \
                       -f ./backend/Dockerfile \
                       ./backend

          echo "🚀 Pushing Backend Image..."
          docker push "$BACKEND_IMAGE_URI"
          echo "✅ Backend image pushed: $BACKEND_IMAGE_URI"
          
          # === BUILD FRONTEND ===
          echo "🔨 Building Frontend Docker Image..."
          FRONTEND_IMAGE_URI="$ECR_REGISTRY/$ECR_REPOSITORY:frontend-$IMAGE_TAG"
          
          docker build -t "$FRONTEND_IMAGE_URI" \
                       -f ./frontend/Dockerfile \
                       ./frontend

          echo "🚀 Pushing Frontend Image..."
          docker push "$FRONTEND_IMAGE_URI"
          echo "✅ Frontend image pushed: $FRONTEND_IMAGE_URI"

          # Set outputs
          echo "backend_image_uri=$BACKEND_IMAGE_URI" >> "$GITHUB_OUTPUT"
          echo "frontend_image_uri=$FRONTEND_IMAGE_URI" >> "$GITHUB_OUTPUT"
        env:
          IMAGE_TAG: ${{ github.sha }}
      # ── 5. Deploy to EC2 ──────────────────────────────────────────────────
      - name: Deploy on EC2 via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}

          envs: BACKEND_IMAGE_URI,FRONTEND_IMAGE_URI,CONTAINER_BACKEND,CONTAINER_FRONTEND,BACKEND_PORT,FRONTEND_PORT,AWS_REGION,ECR_REGISTRY

          script: |
            set -e

            echo "🔧 Installing Docker (Amazon Linux 2023)..."
            sudo dnf update -y
            sudo dnf install -y docker
            sudo systemctl start docker
            sudo systemctl enable docker
            sudo usermod -aG docker $USER

            echo "✅ Docker installed and started"

            echo "Logging into ECR..."
            aws ecr get-login-password --region "$AWS_REGION" | \
              sudo docker login --username AWS --password-stdin "$ECR_REGISTRY"

            echo "Pulling latest images..."
            sudo docker pull "$BACKEND_IMAGE_URI"
            sudo docker pull "$FRONTEND_IMAGE_URI"

            echo "Creating docker network..."
            sudo docker network create hello-deploy-network 2>/dev/null || true

            echo "Stopping old containers..."
            sudo docker stop "$CONTAINER_BACKEND" 2>/dev/null || true
            sudo docker rm "$CONTAINER_BACKEND" 2>/dev/null || true
            sudo docker stop "$CONTAINER_FRONTEND" 2>/dev/null || true
            sudo docker rm "$CONTAINER_FRONTEND" 2>/dev/null || true

            echo "Starting backend container..."
            sudo docker run -d \
              --name "$CONTAINER_BACKEND" \
              --restart unless-stopped \
              --network hello-deploy-network \
              -p "$BACKEND_PORT:$BACKEND_PORT" \
              "$BACKEND_IMAGE_URI"

            echo "Starting frontend container..."
            sudo docker run -d \
              --name "$CONTAINER_FRONTEND" \
              --restart unless-stopped \
              --network hello-deploy-network \
              -p "$FRONTEND_PORT:$FRONTEND_PORT" \
              "$FRONTEND_IMAGE_URI"

            echo "Waiting for backend health check..."

            for i in $(seq 1 10); do
              sleep 3
              STATUS=$(curl -s -o /dev/null -w "%{http_code}" http://localhost:$BACKEND_PORT/health || true)
              if [ "$STATUS" = "200" ]; then
                echo "✅ Backend is healthy"
                docker ps
                exit 0
              fi

              echo "Attempt $i failed with HTTP $STATUS"
            done

            echo "❌ Backend health check failed"

            echo "Backend logs:"
            docker logs "$CONTAINER_BACKEND"

            echo "Frontend logs:"
            docker logs "$CONTAINER_FRONTEND"

            exit 1

        env:
          BACKEND_IMAGE_URI: ${{ steps.build-and-push.outputs.backend_image_uri }}
          FRONTEND_IMAGE_URI: ${{ steps.build-and-push.outputs.frontend_image_uri }}

          CONTAINER_BACKEND: ${{ env.CONTAINER_BACKEND }}
          CONTAINER_FRONTEND: ${{ env.CONTAINER_FRONTEND }}

          BACKEND_PORT: ${{ env.BACKEND_PORT }}
          FRONTEND_PORT: ${{ env.FRONTEND_PORT }}

          AWS_REGION: ${{ env.AWS_REGION }}
          ECR_REGISTRY: ${{ env.ECR_REGISTRY }}