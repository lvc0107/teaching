name: Deploy to DEV

on:
  push:
    branches:
      - main        # every push to main triggers a deploy to DEV

env:
  AWS_REGION:               us-east-1
  BACKEND_REPOSITORY_NAME:  deploy1-backend
  FRONTEND_REPOSITORY_NAME: deploy1-frontend
  CONTAINER_BACKEND:        backend-container
  CONTAINER_FRONTEND:       frontend-container
  BACKEND_PORT:             8000
  FRONTEND_PORT:            3000

jobs:
  deploy:
    name: Build → Push ECR → Deploy EC2
    runs-on: ubuntu-latest
    environment: DEV                    # uses the "DEV" GitHub Environment (secrets isolated)

    steps:
      # ── 1. Checkout ────────────────────────────────────────────────────────
      - name: Checkout code
        uses: actions/checkout@v4

      # ── 2. Configure AWS credentials ────────────────────────────────────────
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id:     ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region:            ${{ env.AWS_REGION }}

      # ── 3. Login to Amazon ECR ──────────────────────────────────────────────
      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      # ── 4. Build & push Docker image ────────────────────────────────────────
      - name: Build and push image to ECR
        id: build-image
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          IMAGE_TAG:    ${{ github.sha }}
        run: |
          BACKEND_IMAGE_URI="$ECR_REGISTRY/$BACKEND_REPOSITORY_NAME:$IMAGE_TAG"
          FRONTEND_IMAGE_URI="$ECR_REGISTRY/$FRONTEND_REPOSITORY_NAME:$IMAGE_TAG"

          docker build -t "$BACKEND_IMAGE_URI" backend
          docker push  "$BACKEND_IMAGE_URI"
          docker tag  "$BACKEND_IMAGE_URI" "$ECR_REGISTRY/$BACKEND_REPOSITORY_NAME:latest"
          docker push "$ECR_REGISTRY/$BACKEND_REPOSITORY_NAME:latest"

          docker build -t "$FRONTEND_IMAGE_URI" frontend
          docker push  "$FRONTEND_IMAGE_URI"
          docker tag  "$FRONTEND_IMAGE_URI" "$ECR_REGISTRY/$FRONTEND_REPOSITORY_NAME:latest"
          docker push "$ECR_REGISTRY/$FRONTEND_REPOSITORY_NAME:latest"

          echo "backend_image_uri=$BACKEND_IMAGE_URI" >> "$GITHUB_OUTPUT"
          echo "frontend_image_uri=$FRONTEND_IMAGE_URI" >> "$GITHUB_OUTPUT"

      # ── 5. SSH into EC2 and redeploy ────────────────────────────────────────
      - name: Deploy on EC2 via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host:        ${{ secrets.EC2_HOST }}          # public IP or DNS
          username:    ${{ secrets.EC2_USER }}          # e.g. "ec2-user" or "ubuntu"
          key:         ${{ secrets.EC2_SSH_KEY }}       # private key (PEM content)
          envs:        BACKEND_IMAGE_URI,FRONTEND_IMAGE_URI,CONTAINER_BACKEND,CONTAINER_FRONTEND,BACKEND_PORT,FRONTEND_PORT,AWS_REGION
          script: |
            set -e

            # Authenticate Docker with ECR from inside the instance
            aws ecr get-login-password --region "$AWS_REGION" | \
              docker login --username AWS --password-stdin \
              "$(aws sts get-caller-identity --query Account --output text).dkr.ecr.$AWS_REGION.amazonaws.com"

            # Pull the exact images that were just built
            docker pull "$BACKEND_IMAGE_URI"
            docker pull "$FRONTEND_IMAGE_URI"

            # Ensure the containers share the same docker network
            docker network create hello-deploy-network 2>/dev/null || true

            # Stop & remove old containers
            docker stop  "$CONTAINER_BACKEND" 2>/dev/null || true
            docker rm    "$CONTAINER_BACKEND" 2>/dev/null || true
            docker stop  "$CONTAINER_FRONTEND" 2>/dev/null || true
            docker rm    "$CONTAINER_FRONTEND" 2>/dev/null || true

            # Start the backend container
            docker run -d \
              --name    "$CONTAINER_BACKEND" \
              --restart unless-stopped \
              --network hello-deploy-network \
              -p        "$BACKEND_PORT:$BACKEND_PORT" \
              "$BACKEND_IMAGE_URI"

            # Start the frontend container on the same network
            docker run -d \
              --name    "$CONTAINER_FRONTEND" \
              --restart unless-stopped \
              --network hello-deploy-network \
              -p        "$FRONTEND_PORT:$FRONTEND_PORT" \
              "$FRONTEND_IMAGE_URI"

            # Quick health check for backend
            echo "Waiting for backend service to be healthy..."
            for i in $(seq 1 5); do
              sleep 3
              STATUS=$(curl -s -o /dev/null -w "%{http_code}" http://localhost:$BACKEND_PORT/health || true)
              if [ "$STATUS" = "200" ]; then
                echo "✅ Backend is up (HTTP 200)"
                exit 0
              fi
              echo "  attempt $i — got HTTP $STATUS"
            done

            echo "❌ Health check failed after 15 s"
            docker logs "$CONTAINER_BACKEND"
            exit 1
        env:
          BACKEND_IMAGE_URI:  ${{ steps.build-image.outputs.backend_image_uri }}
          FRONTEND_IMAGE_URI: ${{ steps.build-image.outputs.frontend_image_uri }}
          CONTAINER_BACKEND:  ${{ env.CONTAINER_BACKEND }}
          CONTAINER_FRONTEND: ${{ env.CONTAINER_FRONTEND }}
          BACKEND_PORT:       ${{ env.BACKEND_PORT }}
          FRONTEND_PORT:      ${{ env.FRONTEND_PORT }}
          AWS_REGION:         ${{ env.AWS_REGION }}
